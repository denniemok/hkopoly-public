<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <title>HKOPOLY | Hong Kong Monopoly Online</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0c0a18;
        color: #f0e4f0;
        font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      }

      #shell {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
      }

      #game {
        flex: 1 1 auto;
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
        background: #0c0a18;
      }

      #loading {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        gap: 0.75rem;
        background:
          radial-gradient(ellipse 90% 70% at 12% 18%, rgba(100, 72, 108, 0.12) 0%, transparent 68%),
          radial-gradient(ellipse 75% 55% at 88% 22%, rgba(72, 64, 96, 0.1) 0%, transparent 62%),
          #0c0a18;
        transition: opacity 0.35s ease, visibility 0.35s ease;
        z-index: 1;
      }

      #loading.is-hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      #loading p {
        font-size: 0.95rem;
        letter-spacing: 0.02em;
        color: #d4b0c4;
      }

      .spinner {
        width: 2rem;
        height: 2rem;
        border: 2px solid rgba(212, 176, 196, 0.2);
        border-top-color: #d4b0c4;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      #fallback {
        position: absolute;
        inset: auto 1rem 1rem;
        left: 50%;
        transform: translateX(-50%);
        display: none;
        align-items: center;
        gap: 0.75rem;
        padding: 0.65rem 1rem;
        border: 1px solid rgba(212, 176, 196, 0.25);
        border-radius: 999px;
        background: rgba(24, 20, 34, 0.92);
        backdrop-filter: blur(8px);
        font-size: 0.85rem;
        z-index: 2;
      }

      #fallback.is-visible {
        display: inline-flex;
      }

      #fallback a {
        color: #f0e4f0;
        text-decoration: none;
        font-weight: 600;
      }

      #fallback a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div id="shell">
      <div id="loading" aria-live="polite" aria-busy="true">
        <div class="spinner" aria-hidden="true"></div>
        <p>Loading HKOPOLY…</p>
      </div>

      <iframe
        id="game"
        src="https://hkopoly.com"
        title="HKOPOLY | Hong Kong Monopoly Online"
        allow="fullscreen; autoplay"
        referrerpolicy="no-referrer-when-downgrade"
      ></iframe>

      <div id="fallback" role="status">
        <span>Having trouble?</span>
        <a id="open-tab" href="https://hkopoly.com" target="_blank" rel="noopener noreferrer">Open hkopoly.com</a>
      </div>
    </div>

    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var locale = (params.get('locale') || '').toLowerCase();
        var gameUrl =
          locale === 'zh' || locale === 'zh-hk' || locale === 'zh-hant-hk'
            ? 'https://zh.hkopoly.com'
            : 'https://hkopoly.com';

        var frame = document.getElementById('game');
        var loading = document.getElementById('loading');
        var fallback = document.getElementById('fallback');
        var openTab = document.getElementById('open-tab');

        frame.src = gameUrl;
        openTab.href = gameUrl;

        function hideLoading() {
          loading.classList.add('is-hidden');
          loading.setAttribute('aria-busy', 'false');
        }

        frame.addEventListener('load', hideLoading);

        window.setTimeout(function () {
          hideLoading();
          fallback.classList.add('is-visible');
        }, 12000);
      })();
    </script>
  </body>
</html>
